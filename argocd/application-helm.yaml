# ============================================================
# ArgoCD Application — Déploiement via Helm Chart
# Auteur: KHLIFI HOUCEM / FORMATEUR DEVSECOPS & CLOUD
# ============================================================
# Utilise le Helm chart du dossier helm/demo-app/
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-helm
  namespace: argocd
  labels:
    app: k8s-demo
    author: khlifi-houcem
    deploy-method: helm
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Source : Helm chart dans le repo GitHub
  source:
    repoURL: https://github.com/houcemdevops007/TP-K8s-demo.git
    targetRevision: main
    path: helm/demo-app

    # Paramètres Helm (override des values.yaml)
    helm:
      releaseName: demo-app
      valueFiles:
        - values.yaml
      # Override de valeurs spécifiques (optionnel)
      # parameters:
      #   - name: replicaCount
      #     value: "3"
      #   - name: ingress.host
      #     value: "demo.production.local"
      #   - name: config.APP_ENV
      #     value: "staging"

  # Destination : cluster local, namespace demo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app

  # Politique de synchronisation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
