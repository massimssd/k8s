# ============================================================
# ArgoCD Application — Déploiement via manifests K8s bruts
# Auteur: KHLIFI HOUCEM / FORMATEUR DEVSECOPS & CLOUD
# ============================================================
# Utilise les manifests YAML du dossier k8s/ directement
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-manifests
  namespace: argocd
  labels:
    app: k8s-demo
    author: khlifi-houcem
    deploy-method: manifests
  # Finalizer pour le nettoyage automatique des ressources
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Source : dossier k8s/ du repo GitHub
  source:
    repoURL: https://github.com/houcemdevops007/TP-K8s-demo.git
    targetRevision: main
    path: k8s

  # Destination : cluster local, namespace demo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app

  # Politique de synchronisation
  syncPolicy:
    automated:
      prune: true         # Supprime les ressources obsolètes
      selfHeal: true      # Corrige les dérives de configuration
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
